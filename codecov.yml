---
coverage:
  precision: 2
  round: down
  range: "85...100"
  status:
    project:
      default:
        threshold: 1%
        target: auto
        paths:
          - "app/**"
          - "core/**"
    patch:
      default:
        informational: true
        target: 75%
        threshold: 100%

comment:
  layout: "condensed_header, components, tree, condensed_footer"
  show_critical_paths: true

ignore:
  - ".devcontainer/**"
  - ".github/**"
  - ".vscode/**"
  - ".xmake/**"
  - "build/**"
  - "tests/**"
